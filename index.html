          "name": "What is Hyperliquid copy trading?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hyperliquid copy trading allows users to automatically replicate the trades of experienced vault managers on the Hyperliquid decentralized exchange. By depositing funds into a vault, your capital follows the same positions and strategies as the vault leader, proportional to your deposit size."

          }
        },
        {
          "@type": "Question",
          "name": "What is the Sharpe ratio and why does it matter for copy trading?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Sharpe ratio measures risk-adjusted return — how much excess return you receive per unit of volatility. A Sharpe ratio above 1.0 indicates good risk-adjusted performance, and above 2.0 is considered excellent. It helps copy traders identify vaults that deliver consistent returns without excessive risk."
          }
        },
        {
          "@type": "Question",
          "name": "How often is the vault data updated?",

          }
        }
